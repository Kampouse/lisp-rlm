[package]
name = "lisp-rlm"
version = "0.1.0"
edition = "2021"
description = "Recursive Language Model runtime in Lisp"

[[bin]]
name = "rlm"
path = "src/bin/rlm.rs"

[[bin]]
name = "lisp-minimal"
path = "src/bin/minimal.rs"

[[bin]]
name = "lisp-bench"
path = "src/bin/bench.rs"

[[bin]]
name = "lisp-test-runner"
path = "src/bin/test_runner.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
sha2 = "0.10"
sha3 = "0.10"
rustyline = "14"
stacker = "0.1"
